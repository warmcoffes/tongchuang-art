<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>签到扣课</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#f6f0e6;color:#171717;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif}
.app{max-width:860px;margin:0 auto;padding:18px}
.back{display:inline-block;margin-bottom:16px;color:#171717;text-decoration:none;font-size:14px;font-weight:700}
.panel,.log{background:#fff;border:1px solid rgba(23,23,23,.12);border-radius:24px;padding:22px}
h1{margin:0 0 14px;font-size:30px;letter-spacing:-.04em}
.status{margin:0 0 18px;padding:12px 14px;border-radius:14px;background:#fbfaf6;border:1px solid rgba(23,23,23,.08);color:#61594f;font-size:14px;display:none}
.status.show{display:block}
.status.error{background:#fff0ea;color:#9b3f24}
.status.ok{background:#edf6ef;color:#245b39}
.search{display:grid;grid-template-columns:1fr auto;gap:12px}
.field,.select,.area{border:1px solid rgba(23,23,23,.12);border-radius:14px;background:#faf8f3;color:#171717}
.field,.select{min-height:48px;padding:0 14px}
.area{width:100%;min-height:92px;padding:12px 14px;resize:vertical}
.btn{min-height:48px;padding:0 18px;border:0;border-radius:999px;background:#1f1f1c;color:#fff;font-weight:800;cursor:pointer}
.student{margin-top:18px;border:1px solid rgba(23,23,23,.08);border-radius:18px;padding:18px;background:#fbfaf6}
.meta{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px}
.box{padding:14px;border-radius:16px;background:#fff;border:1px solid rgba(23,23,23,.08)}
.box strong{display:block;font-size:22px}
.box span{display:block;margin-top:4px;color:#71695d;font-size:12px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.log{margin-top:18px}
.log h2{margin:0 0 12px;font-size:20px}
.log ul{margin:0;padding-left:18px;color:#71695d;line-height:1.9}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
@media (max-width:760px){.search,.meta,.controls{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <a class="back" href="index.html">返回管理入口</a>
  <section class="panel">
    <h1>签到扣课</h1>
    <div id="status" class="status"></div>
    <div class="search">
      <input id="keyword" class="field" type="text" placeholder="输入学员姓名 / 家长姓名 / 电话号码">
      <button id="search-btn" class="btn" type="button">搜索</button>
    </div>
    <div id="student-box" class="student" style="display:none">
      <strong id="student-name" style="font-size:24px"></strong>
      <div id="student-sub" style="margin-top:6px;color:#71695d"></div>
      <div class="meta">
        <div class="box"><strong id="total-lessons">0</strong><span>总课时</span></div>
        <div class="box"><strong id="remaining-lessons">0</strong><span>剩余课时</span></div>
        <div class="box"><strong id="last-checkin">-</strong><span>最近签到</span></div>
      </div>
      <div class="controls">
        <select id="action-type" class="select">
          <option value="checkin">签到扣 1 课时</option>
          <option value="leave">请假（不扣课）</option>
          <option value="makeup">补课扣 1 课时</option>
          <option value="adjust">手动调整</option>
        </select>
        <input id="lesson-delta" class="field" type="number" value="-1" placeholder="课时变动">
      </div>
      <textarea id="action-note" class="area" placeholder="备注"></textarea>
      <div class="actions">
        <button id="save-log-btn" class="btn" type="button">保存记录</button>
      </div>
    </div>
  </section>
  <section class="log">
    <h2>最近课时流水</h2>
    <ul id="log-list"><li>暂无记录</li></ul>
  </section>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase-config.js"></script>
<script src="./supabase-client.js"></script>
<script src="./auth.js"></script>
<script>
const statusBox=document.getElementById("status");
const keywordInput=document.getElementById("keyword");
const searchBtn=document.getElementById("search-btn");
const studentBox=document.getElementById("student-box");
const studentName=document.getElementById("student-name");
const studentSub=document.getElementById("student-sub");
const totalLessons=document.getElementById("total-lessons");
const remainingLessons=document.getElementById("remaining-lessons");
const lastCheckin=document.getElementById("last-checkin");
const actionType=document.getElementById("action-type");
const lessonDelta=document.getElementById("lesson-delta");
const actionNote=document.getElementById("action-note");
const saveLogBtn=document.getElementById("save-log-btn");
const logList=document.getElementById("log-list");
let currentStudent=null;
function setStatus(message,type=""){
  if(!message){statusBox.textContent="";statusBox.className="status";return;}
  statusBox.className="status show"+(type?" "+type:"");
  statusBox.textContent=message;
}
function formatDate(value){return value?String(value).slice(0,10):"-"}
function actionText(type){
  if(type==="leave") return "请假";
  if(type==="makeup") return "补课";
  if(type==="adjust") return "手动调整";
  return "签到";
}
function defaultDelta(type){
  if(type==="leave") return 0;
  if(type==="adjust") return 0;
  return -1;
}
actionType.addEventListener("change",()=>{lessonDelta.value=defaultDelta(actionType.value);});
async function renderLogs(client, studentId){
  const { data, error }=await client.from("lesson_logs").select("*").eq("student_id",studentId).order("created_at",{ascending:false}).limit(8);
  if(error) throw error;
  if(!data||!data.length){
    logList.innerHTML="<li>暂无记录</li>";
    lastCheckin.textContent="-";
    return;
  }
  logList.innerHTML=data.map(item=>`<li>${formatDate(item.created_at)} · ${actionText(item.action_type)} · ${item.lesson_delta>0?"+":""}${item.lesson_delta}${item.note?" · "+item.note:""}</li>`).join("");
  const latestCheckinRow=data.find(item=>item.action_type==="checkin"||item.action_type==="makeup");
  lastCheckin.textContent=latestCheckinRow?formatDate(latestCheckinRow.created_at):"-";
}
async function searchStudent(){
  const keyword=keywordInput.value.trim();
  if(!keyword){setStatus("请输入学员信息","error");return;}
  try{
    const client=window.tcManage.getClient();
    const session=await window.tcManage.getSession();
    if(!session){setStatus("当前未登录","error");return;}
    setStatus("");
    const { data, error }=await client.from("students").select("*").or(`student_name.ilike.%${keyword}%,contact_name.ilike.%${keyword}%,phone.ilike.%${keyword}%`).order("created_at",{ascending:false}).limit(1);
    if(error) throw error;
    if(!data||!data.length){
      currentStudent=null;
      studentBox.style.display="none";
      logList.innerHTML="<li>暂无记录</li>";
      setStatus("没有找到匹配学员","error");
      return;
    }
    currentStudent=data[0];
    studentName.textContent=currentStudent.student_name;
    studentSub.textContent=`${currentStudent.course_name||"-"} · ${currentStudent.contact_name} · ${currentStudent.phone}`;
    totalLessons.textContent=currentStudent.total_lessons??0;
    remainingLessons.textContent=currentStudent.remaining_lessons??0;
    studentBox.style.display="block";
    await renderLogs(client,currentStudent.id);
    setStatus("");
  }catch(error){
    setStatus(window.tcManage.formatError(error),"error");
  }
}
async function saveLog(){
  if(!currentStudent){setStatus("请先搜索学员","error");return;}
  try{
    const client=window.tcManage.getClient();
    const session=await window.tcManage.getSession();
    if(!session){setStatus("当前未登录","error");return;}
    saveLogBtn.disabled=true;
    setStatus("");
    const delta=Number(lessonDelta.value||0);
    const { error }=await client.from("lesson_logs").insert({
      student_id:currentStudent.id,
      action_type:actionType.value,
      lesson_delta:delta,
      note:actionNote.value.trim()||null
    });
    if(error) throw error;
    const { data: refreshed, error: refreshError }=await client.from("students").select("*").eq("id",currentStudent.id).single();
    if(refreshError) throw refreshError;
    currentStudent=refreshed;
    remainingLessons.textContent=currentStudent.remaining_lessons??0;
    await renderLogs(client,currentStudent.id);
    actionNote.value="";
    setStatus("已保存","ok");
  }catch(error){
    setStatus(window.tcManage.formatError(error),"error");
  }finally{
    saveLogBtn.disabled=false;
  }
}
searchBtn.addEventListener("click",searchStudent);
keywordInput.addEventListener("keydown",event=>{if(event.key==="Enter"){event.preventDefault();searchStudent();}});
saveLogBtn.addEventListener("click",saveLog);
</script>
</body>
</html>
