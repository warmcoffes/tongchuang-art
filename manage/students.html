<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>学员列表</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#f6f0e6;color:#171717;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif}
.app{max-width:980px;margin:0 auto;padding:18px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
.back,.new{font-size:14px;font-weight:700;text-decoration:none}
.back{color:#171717}
.new{color:#fff;background:#1f1f1c;padding:10px 14px;border-radius:999px}
.search,.table-wrap{background:#fff;border:1px solid rgba(23,23,23,.12);border-radius:22px}
.search{padding:18px;margin-bottom:16px}
h1{margin:0 0 14px;font-size:28px;letter-spacing:-.04em}
.status{margin:0 0 14px;padding:12px 14px;border-radius:14px;background:#fbfaf6;border:1px solid rgba(23,23,23,.08);color:#61594f;font-size:14px;display:none}
.status.show{display:block}
.status.error{background:#fff0ea;color:#9b3f24}
.status.ok{background:#edf6ef;color:#245b39}
.search-row{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px}
.field{min-height:44px;border:1px solid rgba(23,23,23,.12);border-radius:14px;padding:0 14px;background:#faf8f3;color:#171717}
.table-wrap{overflow:hidden}
table{width:100%;border-collapse:collapse}
th,td{padding:14px 16px;text-align:left;border-bottom:1px solid rgba(23,23,23,.08);font-size:14px;vertical-align:top}
th{font-size:12px;color:#746c61;letter-spacing:.08em}
.actions-cell{white-space:nowrap}
.muted{color:#746c61;font-size:12px;line-height:1.6}
.tag{display:inline-flex;padding:5px 10px;border-radius:999px;background:#edf4ee;color:#2d6b4a;font-size:12px;font-weight:700}
.low{background:#fff1de;color:#9a6300}
.expired{background:#f3ebff;color:#6b46b2}
.stopped{background:#efefef;color:#5f5f5f}
.danger-btn{min-height:34px;padding:0 12px;border:0;border-radius:999px;background:#f3dfd8;color:#9b3f24;font-size:12px;font-weight:800;cursor:pointer}
.danger-btn:disabled{opacity:.55;cursor:wait}
.empty{padding:28px 18px;color:#746c61;text-align:center;line-height:1.8}
@media (max-width:760px){.search-row{grid-template-columns:1fr}table,thead,tbody,tr,td,th{display:block}thead{display:none}tr{padding:10px 0;border-bottom:1px solid rgba(23,23,23,.08)}td{border:0;padding:6px 16px}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <a class="back" href="index.html">返回管理入口</a>
    <a class="new" href="new.html">新增学员</a>
  </div>
  <section class="search">
    <h1>学员列表</h1>
    <div id="status" class="status"></div>
    <div class="search-row">
      <input id="keyword" class="field" type="text" placeholder="搜索学员姓名 / 家长姓名 / 电话号码">
      <select id="course-filter" class="field"><option value="">全部课程</option></select>
      <select id="status-filter" class="field">
        <option value="">全部状态</option>
        <option value="active">正常上课</option>
        <option value="low_lessons">课时不足</option>
        <option value="expired">已过有效期</option>
        <option value="stopped">已停课</option>
      </select>
    </div>
  </section>
  <section class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>学员</th>
          <th>联系</th>
          <th>课程</th>
          <th>总课时</th>
          <th>剩余</th>
          <th>最近签到</th>
          <th>状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="students-body"><tr><td colspan="8" class="empty">正在加载</td></tr></tbody>
    </table>
  </section>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase-config.js"></script>
<script src="./supabase-client.js"></script>
<script src="./auth.js"></script>
<script>
const statusBox=document.getElementById("status");
const body=document.getElementById("students-body");
const keywordInput=document.getElementById("keyword");
const courseFilter=document.getElementById("course-filter");
const statusFilter=document.getElementById("status-filter");
let students=[]; 
let latestCheckins=new Map();
function setStatus(message,type=""){
  if(!message){statusBox.textContent="";statusBox.className="status";return;}
  statusBox.className="status show"+(type?" "+type:"");
  statusBox.textContent=message;
}
function maskPhone(phone){if(!phone)return "-"; if(phone.length<7)return phone; return phone.slice(0,3)+"****"+phone.slice(-4)}
function formatDate(value){return value?String(value).slice(0,10):"-"}
function personLabel(value){return value==="adult"?"成人":"儿童"}
function statusLabel(value){
  if(value==="low_lessons") return {text:"课时不足", className:"tag low"};
  if(value==="expired") return {text:"已过有效期", className:"tag expired"};
  if(value==="stopped") return {text:"已停课", className:"tag stopped"};
  return {text:"正常上课", className:"tag"};
}
function renderCourses(){
  const courseNames=Array.from(new Set(students.map(item=>item.course_name).filter(Boolean)));
  courseFilter.innerHTML='<option value="">全部课程</option>'+courseNames.map(name=>`<option value="${name}">${name}</option>`).join("");
}
function renderRows(){
  const keyword=keywordInput.value.trim().toLowerCase();
  const course=courseFilter.value;
  const status=statusFilter.value;
  const filtered=students.filter(item=>{
    const matchesKeyword=!keyword||[item.student_name,item.contact_name,item.phone].filter(Boolean).some(text=>String(text).toLowerCase().includes(keyword));
    const matchesCourse=!course||item.course_name===course;
    const matchesStatus=!status||item.status===status;
    return matchesKeyword&&matchesCourse&&matchesStatus;
  });
  if(!filtered.length){
    body.innerHTML='<tr><td colspan="8" class="empty">没有匹配结果</td></tr>';
    return;
  }
  body.innerHTML=filtered.map(item=>{
    const tag=statusLabel(item.status);
    const lastCheckin=latestCheckins.get(item.id)||item.created_at;
    return `<tr>
      <td>${item.student_name}<br><span class="muted">${personLabel(item.person_type)}${item.age ? " / "+item.age+"岁" : ""}</span></td>
      <td>${item.contact_name}<br><span class="muted">${maskPhone(item.phone)}</span></td>
      <td>${item.course_name||"-"}</td>
      <td>${item.total_lessons??0}</td>
      <td>${item.remaining_lessons??0}</td>
      <td>${formatDate(lastCheckin)}</td>
      <td><span class="${tag.className}">${tag.text}</span></td>
      <td class="actions-cell"><button class="danger-btn" type="button" data-delete-id="${item.id}" data-delete-name="${item.student_name}">删除</button></td>
    </tr>`;
  }).join("");
  body.querySelectorAll("[data-delete-id]").forEach(button=>button.addEventListener("click",()=>deleteStudent(button)));
}
async function loadLatestCheckins(client){
  const { data, error }=await client.from("lesson_logs").select("student_id, created_at, action_type").eq("action_type","checkin").order("created_at",{ascending:false});
  if(error) throw error;
  latestCheckins=new Map();
  for(const row of data||[]){
    if(!latestCheckins.has(row.student_id)){latestCheckins.set(row.student_id,row.created_at);}
  }
}
async function loadStudents(){
  if(!window.tcManage.hasConfig()){
    setStatus("Supabase 配置未完成","error");
    body.innerHTML='<tr><td colspan="8" class="empty">配置未完成</td></tr>';
    return;
  }
  const session=await window.tcManage.getSession();
  if(!session){
    setStatus("当前未登录","error");
    body.innerHTML='<tr><td colspan="8" class="empty">当前未登录</td></tr>';
    return;
  }
  try{
    const client=window.tcManage.getClient();
    const { data, error }=await client.from("students").select("*").order("created_at",{ascending:false});
    if(error) throw error;
    students=data||[];
    await loadLatestCheckins(client);
    renderCourses();
    renderRows();
    setStatus("");
  }catch(error){
    setStatus(window.tcManage.formatError(error),"error");
    body.innerHTML='<tr><td colspan="8" class="empty">读取失败</td></tr>';
  }
}
async function deleteStudent(button){
  const studentId=button.getAttribute("data-delete-id");
  const studentName=button.getAttribute("data-delete-name")||"这位学员";
  const confirmed=confirm(`确认删除“${studentName}”吗？\n这会同时删除相关签到和缴费记录。`);
  if(!confirmed) return;
  try{
    button.disabled=true;
    setStatus(`正在删除：${studentName}`);
    const client=window.tcManage.getClient();
    const { error }=await client.from("students").delete().eq("id",studentId);
    if(error) throw error;
    students=students.filter(item=>item.id!==studentId);
    latestCheckins.delete(studentId);
    renderCourses();
    renderRows();
    setStatus(`已删除：${studentName}`,"ok");
  }catch(error){
    button.disabled=false;
    setStatus(window.tcManage.formatError(error),"error");
  }
}
keywordInput.addEventListener("input",renderRows);
courseFilter.addEventListener("change",renderRows);
statusFilter.addEventListener("change",renderRows);
loadStudents();
</script>
</body>
</html>
