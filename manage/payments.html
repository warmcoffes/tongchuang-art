<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>缴费记录</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#f6f0e6;color:#171717;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif}
.app{max-width:920px;margin:0 auto;padding:18px}
.back{display:inline-block;margin-bottom:16px;color:#171717;text-decoration:none;font-size:14px;font-weight:700}
.panel,.records{background:#fff;border:1px solid rgba(23,23,23,.12);border-radius:24px;padding:22px}
h1{margin:0 0 14px;font-size:30px;letter-spacing:-.04em}
.status{margin:0 0 18px;padding:12px 14px;border-radius:14px;background:#fbfaf6;border:1px solid rgba(23,23,23,.08);color:#61594f;font-size:14px;display:none}
.status.show{display:block}
.status.error{background:#fff0ea;color:#9b3f24}
.status.ok{background:#edf6ef;color:#245b39}
.grid{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:12px}
.field{min-height:46px;padding:0 14px;border:1px solid rgba(23,23,23,.12);border-radius:14px;background:#faf8f3;color:#171717}
.actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.btn{min-height:44px;padding:0 16px;border-radius:999px;border:0;font-weight:800;cursor:pointer}
.primary{background:#1f1f1c;color:#fff}
.secondary{background:#ece6da;color:#171717}
.records{margin-top:18px}
.row{display:grid;grid-template-columns:1.2fr .8fr .8fr 1fr;gap:12px;padding:14px 0;border-bottom:1px solid rgba(23,23,23,.08)}
.row:last-child{border-bottom:0}
.muted{color:#71695d;font-size:13px}
@media (max-width:760px){.grid,.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <a class="back" href="index.html">返回管理入口</a>
  <section class="panel">
    <h1>缴费记录</h1>
    <div id="status" class="status"></div>
    <div class="grid">
      <input id="student-keyword" class="field" type="text" placeholder="学员姓名 / 家长姓名 / 电话">
      <input id="amount" class="field" type="number" min="0" step="0.01" placeholder="缴费金额">
      <select id="method" class="field">
        <option value="">缴费方式</option>
        <option value="微信">微信</option>
        <option value="支付宝">支付宝</option>
        <option value="现金">现金</option>
        <option value="转账">转账</option>
      </select>
    </div>
    <div class="actions">
      <button id="save-btn" class="btn primary" type="button">保存记录</button>
      <button id="clear-btn" class="btn secondary" type="button">清空</button>
    </div>
  </section>
  <section class="records" id="records"><div class="muted">正在读取</div></section>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase-config.js"></script>
<script src="./supabase-client.js"></script>
<script>
const statusBox=document.getElementById("status");
const keywordInput=document.getElementById("student-keyword");
const amountInput=document.getElementById("amount");
const methodInput=document.getElementById("method");
const saveBtn=document.getElementById("save-btn");
const clearBtn=document.getElementById("clear-btn");
const recordsBox=document.getElementById("records");
let studentsCache=[];
function setStatus(message,type=""){
  if(!message){statusBox.textContent="";statusBox.className="status";return;}
  statusBox.className="status show"+(type?" "+type:"");
  statusBox.textContent=message;
}
function formatDate(value){return value?String(value).slice(0,10):"-"}
async function loadStudentsCache(client){
  const { data, error }=await client.from("students").select("id, student_name, contact_name, phone, course_name").order("created_at",{ascending:false});
  if(error) throw error;
  studentsCache=data||[];
}
function findStudent(){
  const keyword=keywordInput.value.trim().toLowerCase();
  if(!keyword) return null;
  return studentsCache.find(item=>[item.student_name,item.contact_name,item.phone].filter(Boolean).some(text=>String(text).toLowerCase().includes(keyword)))||null;
}
async function loadPayments(){
  try{
    const client=window.tcManage.getClient();
    const { data, error }=await client.from("payments").select("*, students(student_name, course_name)").order("paid_at",{ascending:false}).limit(30);
    if(error) throw error;
    if(!data||!data.length){recordsBox.innerHTML='<div class="muted">暂无缴费记录</div>';return;}
    recordsBox.innerHTML=data.map(item=>`
      <div class="row">
        <div><strong>${item.students?.student_name||"-"}</strong><div class="muted">${item.students?.course_name||"-"}</div></div>
        <div><strong>¥ ${Number(item.amount).toFixed(2)}</strong><div class="muted">已缴费</div></div>
        <div><strong>${item.method||"-"}</strong><div class="muted">支付方式</div></div>
        <div><strong>${formatDate(item.paid_at)}</strong><div class="muted">缴费时间</div></div>
      </div>
    `).join("");
  }catch(error){
    recordsBox.innerHTML=`<div class="muted">${window.tcManage.formatError(error)}</div>`;
  }
}
async function savePayment(){
  try{
    const client=window.tcManage.getClient();
    const session=await window.tcManage.getSession();
    if(!session){setStatus("当前未登录","error");return;}
    const student=findStudent();
    if(!student){setStatus("没有找到对应学员","error");return;}
    const amount=Number(amountInput.value||0);
    if(amount<=0){setStatus("请输入有效金额","error");return;}
    if(!methodInput.value){setStatus("请选择缴费方式","error");return;}
    saveBtn.disabled=true;
    setStatus("");
    const { error }=await client.from("payments").insert({
      student_id:student.id,
      amount,
      method:methodInput.value,
      paid_at:new Date().toISOString(),
      note:"手动录入"
    });
    if(error) throw error;
    amountInput.value="";
    methodInput.value="";
    setStatus(`已保存：${student.student_name}`,"ok");
    await loadPayments();
  }catch(error){
    setStatus(window.tcManage.formatError(error),"error");
  }finally{
    saveBtn.disabled=false;
  }
}
clearBtn.addEventListener("click",()=>{keywordInput.value="";amountInput.value="";methodInput.value="";});
saveBtn.addEventListener("click",savePayment);
async function init(){
  if(!window.tcManage.hasConfig()){setStatus("Supabase 配置未完成","error");return;}
  const session=await window.tcManage.getSession();
  if(!session){setStatus("当前未登录","error");return;}
  const client=window.tcManage.getClient();
  await loadStudentsCache(client);
  await loadPayments();
}
init();
</script>
</body>
</html>
